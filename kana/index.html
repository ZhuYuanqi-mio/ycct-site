<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票日K线标注分析</title>
  <link rel="stylesheet" href="css/style.css?v=20260430b">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111827'/%3E%3Crect x='17' y='14' width='8' height='36' fill='%23ef4444'/%3E%3Crect x='39' y='22' width='8' height='28' fill='none' stroke='%23ef4444' stroke-width='2'/%3E%3C/svg%3E">
</head>
<body>

<!-- ============== SVG 图标库（用 <use href="#icon-xxx"/> 引用） ============== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="icon-plus" viewBox="0 0 16 16">
      <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 16 16">
      <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 16 16">
      <path d="M3 4h10M6 4V2.5h4V4M5 4l.5 9a1 1 0 001 1h3a1 1 0 001-1l.5-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-import" viewBox="0 0 16 16">
      <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-download" viewBox="0 0 16 16">
      <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-eraser" viewBox="0 0 16 16">
      <path d="M2 12.5l5 1L13 7.5 9 3.5 2.5 10 2 12.5zM7 13.5L9 11.5M2 14h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-check-all" viewBox="0 0 16 16">
      <path d="M2 8.5l3 3 8-8M6 11.5l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-bookmark" viewBox="0 0 16 16">
      <path d="M4 2h8v12l-4-3-4 3V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-warn" viewBox="0 0 16 16">
      <path d="M8 1.5l7 12.5H1L8 1.5zM8 6.5v3.5M8 12v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-flask" viewBox="0 0 16 16">
      <path d="M6 1h4M6.5 1v4.5L3 13a1 1 0 001 1.5h8a1 1 0 001-1.5L9.5 5.5V1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-copy" viewBox="0 0 16 16">
      <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/>
      <path d="M3 11V3a1 1 0 011-1h7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="icon-zoom-reset" viewBox="0 0 16 16">
      <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4" fill="none"/>
      <path d="M10.5 10.5L13.5 13.5M5 7h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="icon-arrow-left" viewBox="0 0 16 16">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 16 16">
      <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 16 16">
      <path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icon-clock" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" fill="none"/>
      <path d="M8 4.5v3.7l2.5 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </symbol>
  </defs>
</svg>

<div class="header">
  <span class="header-logo">🌿</span>
  <h1>股票日K线标注分析</h1>

  <!-- 手机端「切换股票」下拉（桌面端隐藏；左侧栏已承担此功能） -->
  <div class="header-stock-switcher" id="mobileStockSwitcher">
    <button class="header-stock-btn" id="mobileStockBtn" type="button">
      <span class="header-stock-name" id="mobileStockName">选择股票</span>
      <svg class="ico"><use href="#icon-chevron-down"/></svg>
    </button>
    <div class="header-stock-menu" id="mobileStockMenu" hidden></div>
  </div>
</div>

<div class="layout">

  <!-- 左侧：股票列表 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>我的股票</h3>
      <button class="add-stock-btn" id="btnAddStock">
        <svg class="ico"><use href="#icon-plus"/></svg>
        新建
      </button>
    </div>
    <div class="stock-list" id="stockList">
      <div class="empty-tip">加载中...</div>
    </div>
  </aside>

  <!-- 主区域 -->
  <main class="main">

    <!-- 工具栏 -->
    <div class="toolbar">
      <label class="switch" id="annotSwitch" title="开 = 双击日K打/取消标注；关 = 双击日K弹出该日分时图">
        <input type="checkbox" id="annotMode" checked>
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-label">标注模式</span>
      </label>
      <label class="switch" id="calcModeSwitch" title="开 = 双击图下方标注表里的成交量/成交额单元格累加">
        <input type="checkbox" id="calcMode">
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-label">计算模式</span>
      </label>

      <button class="btn" id="btnClear">
        <svg class="ico"><use href="#icon-eraser"/></svg>
        清空标注
      </button>
      <button class="btn" id="btnSelectAll">
        <svg class="ico"><use href="#icon-check-all"/></svg>
        全选
      </button>

      <span class="sep"></span>

      <span class="opt" title="窗口大小（可直接输入或 ± 1 天）">
        天数
        <span class="fs-group">
          <button class="fs-btn" id="btnZoomOut" type="button" title="多看 1 天">+</button>
          <input class="fs-val fs-input" id="viewSizeInput" type="number" min="8" inputmode="numeric" value="20">
          <button class="fs-btn" id="btnZoomIn" type="button" title="少看 1 天">−</button>
        </span>
      </span>

      <span class="opt" title="按日期范围设置视窗">
        起 <input type="date" class="date-input" id="viewDateStart">
        ~
        <input type="date" class="date-input" id="viewDateEnd">
      </span>

      <span class="sep"></span>

      <label class="opt"><input type="checkbox" id="showAvg" checked> 显示区间平均值</label>

      <span class="opt">
        小数位 价
        <input type="number" id="dpPrice" min="0" max="6" value="0">
        额
        <input type="number" id="dpAmount" min="0" max="6" value="0">
        量
        <input type="number" id="dpVolume" min="0" max="6" value="0">
      </span>

      <span class="opt">
        单位
        <select id="volUnit">
          <option value="100">百</option>
          <option value="1000">千</option>
          <option value="10000">万</option>
          <option value="100000">十万</option>
          <option value="1000000">百万</option>
          <option value="10000000">千万</option>
          <option value="100000000" selected>亿</option>
          <option value="1000000000">十亿</option>
        </select>
      </span>

      <span class="opt">
        字号
        <span class="fs-group">
          <button class="fs-btn" id="fsMinus" type="button">−</button>
          <span class="fs-val" id="fsVal">12px</span>
          <button class="fs-btn" id="fsPlus" type="button">+</button>
        </span>
        <input type="hidden" id="fontSize" value="12">
      </span>

      <span class="grow"></span>

      <button class="btn btn-dark" id="btnSave" title="保存当前标注 + 显示设置">保存</button>
    </div>

    <!-- 计算面板（量/额累加） -->
    <div class="panel" id="calcSec" style="padding:10px 14px;display:none">
      <!-- 计算工具条：按区间累加 -->
      <div class="calc-toolbar">
        <button class="btn btn-primary btn-sm" id="btnIntervalCalc" type="button" title="按时间区间累加分时成交额">
          <svg class="ico"><use href="#icon-clock"/></svg>
          按区间累加成交额
        </button>
        <span class="calc-toolbar-tip">输入「日期 + 起止时间」直接合计该段成交额（亿）</span>
      </div>

      <!-- 日 K 计算表 -->
      <div class="calc-block">
        <div class="calc-block-title">日 K 计算记录</div>
        <div class="calc-table-wrap">
          <table class="calc-table" id="calcDailyTable">
            <tbody></tbody>
          </table>
          <div class="calc-empty" id="calcDailyEmpty">还没有日 K 计算记录 —— 打开「计算模式」后双击图下方标注表里的「成交量」或「成交额」开始累加</div>
        </div>
      </div>

      <!-- 分时计算表 -->
      <div class="calc-block">
        <div class="calc-block-title">分时计算记录</div>
        <div class="calc-table-wrap">
          <table class="calc-table" id="calcIntradayTable">
            <tbody></tbody>
          </table>
          <div class="calc-empty" id="calcIntradayEmpty">还没有分时计算记录 —— 在分时浮窗里双击「交易量」或「交易额」累加</div>
        </div>
      </div>
    </div>

    <!-- 图表 -->
    <div class="panel" style="padding:10px">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">加载中</div>
      </div>
      <div class="chart-wrap" id="chartWrap">
        <div class="empty-chart">初始化中...</div>
      </div>
      <!-- 手机端：标注网格（替代 canvas 内底部标注表） -->
      <div class="marker-grid" id="markerGrid"></div>
    </div>

    <!-- 区间数据表 -->
    <div class="panel" id="intervalSec" style="display:none"></div>

  </main>
</div>

<!-- 新建股票 Modal -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <h3>新建股票</h3>
    <label>股票名称</label>
    <input type="text" id="inpName" placeholder="例：张小泉">
    <label>股票代码</label>
    <input type="text" id="inpCode" placeholder="例：301055">
    <div class="modal-actions">
      <button class="btn" id="btnCancel">取消</button>
      <button class="btn btn-primary" id="btnSubmit">确定</button>
    </div>
  </div>
</div>

<!-- 分时图右下角浮窗（关闭标注模式时双击日 K 弹出） -->
<div class="intraday-popout" id="intradayPop">
  <div class="ip-header">
    <div class="ip-title">
      <span class="ip-symbol" id="ipSymbol">—</span>
      <span class="ip-date" id="ipDate"></span>
      <span class="ip-change" id="ipChange"></span>
      <span class="ip-meta" id="ipMeta"></span>
    </div>
    <button class="ip-close" id="ipClose" title="关闭 (ESC)">
      <svg class="ico"><use href="#icon-close"/></svg>
    </button>
  </div>
  <div class="ip-body">
    <div class="ip-loading" id="ipLoading">
      <div class="spinner"></div>
      <div class="loading-text">加载分时数据...</div>
    </div>
    <div class="ip-empty" id="ipEmpty" style="display:none"></div>
    <canvas id="ipCanvas"></canvas>
  </div>
  <div class="ip-hint">双击插入分钟标注 · 右键删除最近的标注 · ESC 关闭</div>
</div>

<!-- 计算草稿浮框（双击量/额格子或拖框选中时显示） -->
<div class="calc-float" id="calcFloat" style="display:none"></div>

<!-- 按区间累加成交额 弹窗 -->
<div class="modal-mask" id="intervalModalMask">
  <div class="modal interval-modal">
    <div class="interval-modal-left">
      <h3>按区间累加成交额</h3>
      <label>日期 <span class="interval-date-hint" id="intervalDateHint">（可直接键入 2024-01-01）</span></label>
      <input type="date" id="intervalDate" class="interval-date-input">
      <div class="interval-time-row">
        <div class="interval-time-col">
          <label>开始时间</label>
          <input type="time" id="intervalStart" value="09:30" step="60">
        </div>
        <div class="interval-time-col">
          <label>截止时间</label>
          <input type="time" id="intervalEnd" value="11:30" step="60">
        </div>
      </div>
      <div class="interval-result">
        <div class="interval-result-label">区间成交额</div>
        <div class="interval-result-value" id="intervalResultValue">—</div>
      </div>
      <div id="intervalTitleRow">
        <label>标题（可选）</label>
        <input type="text" id="intervalTitle" placeholder="例：开盘 30 分钟 / 尾盘半小时" maxlength="40">
      </div>
      <div class="modal-actions">
        <button class="btn" id="intervalCancel" type="button">取消</button>
        <button class="btn btn-primary" id="intervalSubmit" type="button">保存到分时计算</button>
      </div>
    </div>
    <div class="interval-modal-right">
      <div class="interval-chart-title">分时走势 <span class="interval-chart-legend">
        <span class="lg-bar"></span>当前选中区间
      </span></div>
      <div class="interval-chart-wrap" id="intervalChartWrap">
        <canvas id="intervalChart"></canvas>
        <div class="interval-chart-empty" id="intervalChartEmpty">选择日期后显示分时走势</div>
      </div>
    </div>
  </div>
</div>

<!-- 保存计算的命名弹窗 -->
<div class="modal-mask" id="calcModalMask">
  <div class="modal">
    <h3>保存计算</h3>
    <div class="calc-modal-summary" id="calcModalSummary"></div>
    <label>标题</label>
    <input type="text" id="calcModalTitle" placeholder="例：财报后5日爆量" maxlength="40">
    <div class="modal-actions">
      <button class="btn" id="calcModalCancel">取消</button>
      <button class="btn btn-primary" id="calcModalSubmit">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js?v=20260430b"></script>
<script src="js/zion.js?v=20260430b"></script>
<script src="js/chart.js?v=20260430b"></script>
<script src="js/app.js?v=20260430b"></script>
</body>
</html>
