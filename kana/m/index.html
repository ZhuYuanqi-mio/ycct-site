<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>股票列表 · YCCT</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111827'/%3E%3Crect x='17' y='14' width='8' height='36' fill='%23ef4444'/%3E%3Crect x='39' y='22' width='8' height='28' fill='none' stroke='%23ef4444' stroke-width='2'/%3E%3C/svg%3E">
  <style>
    :root {
      --text:    #111827;
      --text-2:  #4b5563;
      --text-3:  #9ca3af;
      --line:    #e5e7eb;
      --bg:      #f8fafc;
      --bg-card: #ffffff;
      --up:      #ef4444;
      --down:    #22c55e;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px;
    }
    .topbar h1 {
      flex: 1; margin: 0; font-size: 16px; font-weight: 600; color: var(--text);
    }
    .icon-leaf {
      width: 22px; height: 22px;
      background: #ecfdf5;
      border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-leaf svg { width: 14px; height: 14px; }
    .refresh-btn {
      background: none; border: none; color: var(--text-3); padding: 6px;
      font-size: 13px; cursor: pointer;
    }
    .refresh-btn:active { color: var(--text); }

    .empty {
      text-align: center; padding: 80px 24px; color: var(--text-3);
    }
    .empty-title { font-size: 15px; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub   { font-size: 12px; }

    .list { padding: 0; }
    .item {
      display: flex; align-items: center;
      padding: 14px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--line);
      gap: 12px;
      cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .item:active { background: #f3f4f6; }
    /* 列表项里所有文本一律不带下划线 */
    .item, .item * { text-decoration: none !important; }
    .col-name {
      flex: 0 0 92px;
      min-width: 0;
    }
    .col-name .name {
      font-size: 16px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .col-name .code {
      font-size: 12px; color: var(--text-3); margin-top: 2px;
      white-space: nowrap;
    }
    .col-thumb {
      flex: 1; min-width: 0;
      display: flex; align-items: center; justify-content: center;
      height: 44px;
    }
    .col-thumb img,
    .col-thumb svg {
      max-width: 100%; max-height: 44px; display: block;
    }
    .col-thumb .placeholder {
      width: 100%; height: 24px;
      background: repeating-linear-gradient(90deg, var(--line) 0 4px, transparent 4px 8px);
      border-radius: 2px;
      opacity: 0.6;
    }
    .col-meta {
      flex: 0 0 78px;
      text-align: right;
    }
    .col-meta .pct {
      font-size: 15px; font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .col-meta .pct.up   { color: var(--up); }
    .col-meta .pct.down { color: var(--down); }
    .col-meta .pct.flat { color: var(--text-3); }
    .col-meta .range {
      font-size: 10px; color: var(--text-3); margin-top: 3px; line-height: 1.3;
    }

    /* 控制电脑端是否显示的开关 */
    .col-toggle {
      flex: 0 0 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .toggle {
      position: relative;
      width: 32px; height: 18px;
      background: #d1d5db;
      border-radius: 999px;
      transition: background .15s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,.15);
      transition: left .15s;
    }
    .toggle.on { background: #10b981; }
    .toggle.on::after { left: 16px; }
    .toggle.disabled { opacity: 0.5; pointer-events: none; }

    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shine 1.4s infinite linear;
      border-radius: 4px;
    }
    @keyframes shine { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
    .item.loading .col-name .name { width: 70px; height: 16px; display: block; }
    .item.loading .col-name .code { width: 50px; height: 12px; display: block; margin-top: 6px; }
    .item.loading .col-thumb     { background: transparent; }
    .item.loading .col-thumb .placeholder { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shine 1.4s infinite linear; opacity: 1; }
    .item.loading .col-meta .pct  { width: 50px; height: 16px; display: inline-block; margin-left: 36px; }
    .item.loading .col-meta .range { display: none; }

    .footer-tip {
      text-align: center; color: var(--text-3); font-size: 12px;
      padding: 14px 16px 24px;
    }

    /* 桌面端友好（虽然主要为手机端，但 PC 也能看） */
    @media (min-width: 480px) {
      .list { max-width: 480px; margin: 0 auto; }
      .topbar { max-width: 480px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="icon-leaf">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5 19c10 0 14-6 14-14C9 5 5 11 5 19zM5 19l3-3" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
  <h1>股票日K线标注分析</h1>
  <button id="btnRefresh" class="refresh-btn" aria-label="刷新">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<div id="list" class="list" role="list">
  <!-- 骨架占位 -->
  <div class="item loading"><div class="col-name"><span class="name skeleton"></span><span class="code skeleton"></span></div><div class="col-thumb"><div class="placeholder"></div></div><div class="col-meta"><span class="pct skeleton"></span></div></div>
  <div class="item loading"><div class="col-name"><span class="name skeleton"></span><span class="code skeleton"></span></div><div class="col-thumb"><div class="placeholder"></div></div><div class="col-meta"><span class="pct skeleton"></span></div></div>
  <div class="item loading"><div class="col-name"><span class="name skeleton"></span><span class="code skeleton"></span></div><div class="col-thumb"><div class="placeholder"></div></div><div class="col-meta"><span class="pct skeleton"></span></div></div>
</div>

<div class="footer-tip" id="footerTip">加载中…</div>

<script src="../config.js?v=20260430i"></script>
<script>
(function () {
  var CFG = window.YCCT_CONFIG || {};
  var URLS = CFG.zion || {};
  var TIMEOUT = CFG.timeout || 20000;
  var els = {
    list: document.getElementById('list'),
    tip: document.getElementById('footerTip'),
    btn: document.getElementById('btnRefresh'),
  };

  function callWebhook(url, body, ms) {
    var ctrl = new AbortController();
    var t = setTimeout(function () { ctrl.abort(); }, ms || TIMEOUT);
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
      signal: ctrl.signal,
    }).then(function (r) {
      clearTimeout(t);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  async function listStocks() {
    var r = await callWebhook(URLS.listStocks, {});
    var raw = r.stocks_data;
    var arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
    return Array.isArray(arr) ? arr : [];
  }

  async function listKline(stockId) {
    var r = await callWebhook(URLS.listKline, { stock_id: stockId }, 60000);
    var raw = r.kline_data;
    var arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
    return Array.isArray(arr) ? arr : [];
  }

  async function setStockVisible(stockId, visible) {
    if (!URLS.setStockVisible) throw new Error('未配置 setStockVisible webhook');
    return callWebhook(URLS.setStockVisible, { stock_id: stockId, pc_visible: !!visible });
  }

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // 用首尾 close 计算 20 天涨跌幅；若 listKline 不可用就显示 '-'
  async function computeRecentMeta(stock) {
    try {
      var kl = await listKline(stock.id);
      if (!kl.length) return { firstDate: '-', lastDate: '-', pct: null };
      kl.sort(function (a, b) { return (a.date || '') < (b.date || '') ? -1 : 1; });
      var firstDate = kl[0].date || '-';
      var lastDate  = kl[kl.length - 1].date || '-';
      var lastN = kl.slice(-20).map(function (r) { return Number(r.close); }).filter(function (v) { return isFinite(v); });
      if (lastN.length < 2) return { firstDate: firstDate, lastDate: lastDate, pct: null };
      var pct = (lastN[lastN.length - 1] - lastN[0]) / lastN[0] * 100;
      return { firstDate: firstDate, lastDate: lastDate, pct: pct };
    } catch (e) {
      return { firstDate: '-', lastDate: '-', pct: null, err: e };
    }
  }

  function pctClass(p) {
    if (p == null) return 'flat';
    if (p > 0.0001) return 'up';
    if (p < -0.0001) return 'down';
    return 'flat';
  }
  function pctText(p) {
    if (p == null) return '—';
    return (p > 0 ? '+' : '') + p.toFixed(2) + '%';
  }
  function fmtRange(d1, d2) {
    if (!d1 || d1 === '-') return '';
    var s = function (s) { return s ? s.replace(/^\d{2}/, '') : ''; }; // YY-MM-DD
    return s(d1) + '<br>' + s(d2);
  }

  function buildItem(stock, meta) {
    var hasThumb = !!stock.thumb_url;
    var pc = pctClass(meta && meta.pct);
    var visible = stock.pc_visible !== false; // 缺省按显示
    return [
      // 整行不再是 <a>，避免开关点击触发跳转
      '<div class="item" data-id="' + escHtml(stock.id) + '" role="listitem">',
      '  <div class="col-name go" data-id="' + escHtml(stock.id) + '">',
      '    <div class="name">' + escHtml(stock.name) + '</div>',
      '    <div class="code">' + escHtml(stock.code) + '</div>',
      '  </div>',
      '  <div class="col-thumb go" data-id="' + escHtml(stock.id) + '">',
        hasThumb
          ? '<img src="' + escHtml(stock.thumb_url) + '" alt="" loading="lazy" decoding="async" onerror="this.outerHTML=\'<div class=&quot;placeholder&quot;></div>\'">'
          : '<div class="placeholder"></div>',
      '  </div>',
      '  <div class="col-meta go" data-id="' + escHtml(stock.id) + '">',
      '    <div class="pct ' + pc + '">' + (meta ? pctText(meta.pct) : '—') + '</div>',
      '    <div class="range">' + (meta ? fmtRange(meta.firstDate, meta.lastDate) : '') + '</div>',
      '  </div>',
      '  <div class="col-toggle">',
      '    <div class="toggle ' + (visible ? 'on' : '') + '" data-toggle-id="' + escHtml(stock.id) + '" title="' +
            (visible ? '电脑端列表已显示，点击隐藏' : '电脑端列表已隐藏，点击显示') + '"></div>',
      '  </div>',
      '</div>'
    ].join('');
  }

  async function load() {
    els.tip.textContent = '加载中…';
    try {
      var stocks = await listStocks();
      if (!stocks.length) {
        els.list.innerHTML = '<div class="empty"><div class="empty-title">还没有股票</div><div class="empty-sub">先到 PC 端 <a href="../" style="color:#3b82f6">/kana/</a> 新建一只</div></div>';
        els.tip.textContent = '';
        return;
      }
      // 先用基本信息渲染，让用户立刻看到
      els.list.innerHTML = stocks.map(function (s) { return buildItem(s, null); }).join('');
      els.tip.textContent = '正在拉取最近走势 ...';

      // 再并发拿涨跌幅元信息
      var metas = await Promise.all(stocks.map(function (s) { return computeRecentMeta(s); }));
      els.list.innerHTML = stocks.map(function (s, i) { return buildItem(s, metas[i]); }).join('');
      els.tip.textContent = '点击进入 K 线工具';
    } catch (e) {
      els.list.innerHTML = '';
      els.tip.innerHTML = '<span style="color:#ef4444">加载失败：' + escHtml(e && e.message) + '</span>';
    }
  }

  els.btn.addEventListener('click', function () { load(); });

  // 事件委托：跳转 + 开关
  els.list.addEventListener('click', function (e) {
    var tg = e.target.closest('.toggle');
    if (tg) {
      var sid = tg.getAttribute('data-toggle-id');
      var willOn = !tg.classList.contains('on');
      tg.classList.add('disabled');
      setStockVisible(sid, willOn).then(function () {
        tg.classList.toggle('on', willOn);
      }).catch(function (err) {
        alert('保存失败：' + (err && err.message ? err.message : err));
      }).finally(function () {
        tg.classList.remove('disabled');
      });
      return;
    }
    var go = e.target.closest('.go');
    if (go) {
      var id = go.getAttribute('data-id');
      if (id) location.href = '../?id=' + encodeURIComponent(id);
    }
  });

  load();
})();
</script>

</body>
</html>
